omment">// ****Compute properties and flows, build matrix****</span></span><br><span class="line">	Active(NtCount, TimeSim, dT, isFractured); </span><br><span class="line">    <span class="comment">//Modify the elastic matrix and perm. in function ActiveSolid()</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">// **** If not fail, solve the linear system</span></span><br><span class="line">	SolveEQs(Total_NtCount, isFractured, CSR_NNZ_); <span class="comment">//isFractured = true means that reconstructing the Jacbian Matrix is needed!</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">// Check the primary variables are fall in the tolerant range</span></span><br><span class="line">    dx_acpt = CheckDx();</span><br><span class="line"></span><br><span class="line">	<span class="comment">// Update primary and sencondary variables for next iteration</span></span><br><span class="line">	X_acpt = UpdateX();</span><br><span class="line">&#125;</span><br><span class="line">TimeSim += dT;</span><br><span class="line">TmStepCounter++;</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> (AllData-&gt;isFracing)&#123;</span><br><span class="line">	<span class="keyword">if</span> (AllData-&gt;hasNFs)isNewlyFractured = FailureCheckinNFR();  <span class="comment">// Hydraulic fracturing in naturally fractured reservoirs</span></span><br><span class="line">	<span class="keyword">else</span> isNewlyFractured = FailureCheck();                      <span class="comment">// Hydraulic fracturing in intact reservoirs</span></span><br><span class="line">	<span class="keyword">if</span> (AllData-&gt;isEDFM) isNewlyFractured = FailureCheck4EDFM(); <span class="comment">/* 1. Stress state checking for emdedded natural fractures</span></span><br><span class="line"><span class="comment">																    2. Update fracture permeability for emdedded fracture segments */</span></span><br><span class="line">&#125; <span class="keyword">else</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> (!isFractured) isFractured = isNewlyFractured;</span><br><span class="line"><span class="keyword">bool</span> isMinDt = <span class="built_in">abs</span>(dT - MindT)&lt;<span class="number">1.0e-5</span> || dT &lt;= MindT;</span><br><span class="line">isRollback = ((isNewlyFractured || NtCount &gt; maxIteNum) &amp;&amp; !isMinDt);</span><br><span class="line"></span><br><span class="line"><span class="comment">//if (false/*isRollback*/)&#123;</span></span><br><span class="line"><span class="keyword">if</span> (isRollback)&#123;</span><br><span class="line">	TimeSim -= dT;</span><br><span class="line">	RollBackX0();</span><br><span class="line">	++CutBackCount;</span><br><span class="line">	<span class="built_in">cout</span> &lt;&lt; <span class="string">"CutBackCount = "</span> &lt;&lt; CutBackCount;</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">else</span> &#123;</span><br><span class="line">	<span class="built_in">cout</span> &lt;&lt; <span class="string">"/**************************************/"</span> &lt;&lt; <span class="built_in">endl</span>;</span><br><span class="line">	<span class="built_in">cout</span> &lt;&lt; <span class="string">"  Reach convergence at N="</span> &lt;&lt; TmStepCounter &lt;&lt; <span class="string">" time step!\n"</span>;</span><br><span class="line">	<span class="built_in">cout</span> &lt;&lt; <span class="string">"/**************************************/"</span> &lt;&lt; <span class="built_in">endl</span>; <span class="comment">//Sleep(2 * 100);</span></span><br><span class="line">	UpdateX0();</span><br><span class="line">	</span><br><span class="line">	<span class="comment">/*</span></span><br><span class="line"><span class="comment">	  Output for 2D or 3D visualization</span></span><br><span class="line"><span class="comment">	*/</span></span><br><span class="line">	Write_OUTPUT_DATA_VaryVars(TimeSim, dT); <span class="comment">//Include data needed for restarting</span></span><br><span class="line">	OUTPUT_DATA_StateVars(TimeSim);</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">/**************************************************************************/</span></span><br><span class="line"><span class="keyword">if</span> (TimeSim &gt;= End_time || TmStepCounter &gt;= maxTmStps) &#123;</span><br><span class="line">	<span class="keyword">break</span>;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">//Get the size of timestep </span></span><br><span class="line">SET_NEXT_STEP(TimeSim, dT, MaxdT, MindT, isRollback, Current_dT, NtCount);</span><br><span class="line"></span><br><span class="line"><span class="comment">//Elapsed CPU time</span></span><br><span class="line">total_time = (<span class="keyword">double</span>)(clock() - start);</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> (isRollback)&#123;</span><br><span class="line">	Wasted_time += (<span class="keyword">double</span>)(clock() - t_start);</span><br><span class="line">&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
